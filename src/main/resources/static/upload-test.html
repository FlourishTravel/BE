<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Test upload ảnh – FlourishTravel BE</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --accent: #22c55e;
      --accent-dim: #15803d;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --danger: #f87171;
      --radius: 12px;
      --font: 'Segoe UI', system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    header {
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    header h1 { margin: 0; font-size: 1.15rem; font-weight: 600; }
    header p { margin: 6px 0 0; font-size: 0.85rem; color: var(--muted); }
    main { max-width: 560px; margin: 0 auto; padding: 24px 20px 48px; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], input[type="url"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.25);
      color: var(--text);
      font-size: 0.9rem;
    }
    input[type="file"] {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px dashed rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.2);
      color: var(--muted);
    }
    .field { margin-bottom: 18px; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .btn-primary {
      background: var(--accent);
      color: #052e16;
    }
    .btn-primary:hover { background: #4ade80; }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: var(--text);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.16); }
    .preview-wrap {
      margin-top: 16px;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-wrap img {
      max-width: 100%;
      max-height: 280px;
      object-fit: contain;
      display: block;
    }
    .preview-wrap .placeholder { color: var(--muted); font-size: 0.9rem; padding: 24px; text-align: center; }
    .result {
      margin-top: 20px;
      padding: 14px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      word-break: break-all;
      font-size: 0.85rem;
    }
    .result.ok { border-color: rgba(34, 197, 94, 0.35); }
    .result.err { border-color: rgba(248, 113, 113, 0.4); color: var(--danger); }
    .result a { color: #7dd3fc; }
    code { font-size: 0.8rem; background: rgba(0,0,0,0.35); padding: 2px 6px; border-radius: 4px; }
    .hint { font-size: 0.8rem; color: var(--muted); margin-top: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>Test upload ảnh (BE)</h1>
    <p>Mở trang này qua server: <code>/upload-test.html</code> — API <code>POST /upload</code> cần JWT.</p>
  </header>
  <main>
    <div class="field">
      <label for="baseUrl">Base API (context-path)</label>
      <input type="url" id="baseUrl" value="" placeholder="http://localhost:8080">
      <p class="hint">Để trống = cùng origin với trang này (khuyến nghị).</p>
    </div>
    <div class="field">
      <label for="token">JWT access token</label>
      <input type="text" id="token" placeholder="Bearer token từ đăng nhập FE (flourish_token)" autocomplete="off">
      <div class="row">
        <button type="button" class="btn-secondary" id="btnLoadToken">Đọc localStorage <code>flourish_token</code></button>
      </div>
      <p class="hint">Chỉ hoạt động nếu bạn mở FE cùng host/port (vd. dev proxy) hoặc dán token tay từ tab Application → Local Storage.</p>
    </div>
    <div class="field">
      <label for="file">Ảnh (image/*)</label>
      <input type="file" id="file" accept="image/*">
    </div>
    <div class="preview-wrap" id="previewBox">
      <span class="placeholder">Chọn ảnh để xem trước</span>
    </div>
    <div class="row" style="margin-top: 20px;">
      <button type="button" class="btn-primary" id="btnUpload">Upload</button>
    </div>
    <div id="result" class="result" style="display: none;"></div>
  </main>
  <script>
    (function () {
      var baseInput = document.getElementById('baseUrl');
      var tokenInput = document.getElementById('token');
      var fileInput = document.getElementById('file');
      var previewBox = document.getElementById('previewBox');
      var btnUpload = document.getElementById('btnUpload');
      var btnLoadToken = document.getElementById('btnLoadToken');
      var resultEl = document.getElementById('result');

      if (!baseInput.value) {
        baseInput.value = window.location.origin + (window.location.pathname.replace(/\/upload-test\.html$/, '') || '');
      }

      function showResult(html, isErr) {
        resultEl.style.display = 'block';
        resultEl.className = 'result ' + (isErr ? 'err' : 'ok');
        resultEl.innerHTML = html;
      }

      function hideResult() {
        resultEl.style.display = 'none';
      }

      fileInput.addEventListener('change', function () {
        hideResult();
        var f = fileInput.files[0];
        previewBox.innerHTML = '';
        if (!f || !f.type.startsWith('image/')) {
          previewBox.innerHTML = '<span class="placeholder">Chọn ảnh để xem trước</span>';
          return;
        }
        var img = document.createElement('img');
        img.alt = 'preview';
        img.src = URL.createObjectURL(f);
        img.onload = function () { URL.revokeObjectURL(img.src); };
        previewBox.appendChild(img);
      });

      btnLoadToken.addEventListener('click', function () {
        try {
          var t = localStorage.getItem('flourish_token');
          if (t) {
            tokenInput.value = t;
            showResult('Đã đọc token từ localStorage.', false);
          } else {
            showResult('Không có <code>flourish_token</code> trên domain này. Dán token thủ công.', true);
          }
        } catch (e) {
          showResult('localStorage không khả dụng: ' + e.message, true);
        }
      });

      btnUpload.addEventListener('click', async function () {
        hideResult();
        var token = (tokenInput.value || '').trim();
        var file = fileInput.files[0];
        if (!token) {
          showResult('Thiếu JWT.', true);
          return;
        }
        if (!file) {
          showResult('Chọn file ảnh.', true);
          return;
        }
        var base = (baseInput.value || '').trim().replace(/\/$/, '');
        var url = base + '/upload';

        var fd = new FormData();
        fd.append('file', file);

        btnUpload.disabled = true;
        try {
          var res = await fetch(url, {
            method: 'POST',
            headers: { Authorization: 'Bearer ' + token },
            body: fd
          });
          var json = await res.json().catch(function () { return null; });
          if (!res.ok) {
            var msg = json && json.message ? json.message : ('HTTP ' + res.status);
            showResult('Lỗi: ' + msg, true);
            return;
          }
          if (json && json.success && json.data) {
            var u = json.data;
            showResult(
              '<strong>OK</strong> — URL trả về:<br><a href="' + u + '" target="_blank" rel="noopener">' + u + '</a>',
              false
            );
          } else {
            showResult('<pre>' + JSON.stringify(json, null, 2) + '</pre>', !json || !json.success);
          }
        } catch (e) {
          showResult('Lỗi mạng / CORS: ' + e.message + '<br><small>Đảm bảo mở trang từ <code>http://localhost:8080/upload-test.html</code> và BE đang chạy.</small>', true);
        } finally {
          btnUpload.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
