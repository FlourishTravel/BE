# Chạy local: mvn spring-boot:run (pom.xml đã bật profile dev = H2, không Redis).
# JAR / production: không dùng profile dev trừ khi set tay — cần PostgreSQL + Redis như cấu hình dưới.
spring:
  application:
    name: flourish-travel-backend

  datasource:
    # Port 5433 thường dùng khi cài PostgreSQL (vd. PostgreSQL 18); 5432 mặc định. Đổi qua biến DB_PORT nếu cần.
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:flourishtravel}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    # Tránh lỗi "Unable to determine Dialect" khi JDBC metadata chưa lấy được lúc khởi tạo
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    # update = tự tạo/cập nhật bảng khi chạy (chỉ cần tạo database flourishtravel 1 lần trong pgAdmin)
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Cho phép chuỗi JSON chứa ký tự điều khiển (vd. xuống dòng) để request từ Swagger/ client không bị 500
  jackson:
    parser:
      allow-unquoted-control-chars: true

server:
  # PORT: Railway/Render tự set; SERVER_PORT: dùng khi chạy local hoặc set tay
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    context-path: /api

# JWT & Encryption
app:
  encryption:
    pii-key: ${PII_ENCRYPTION_KEY:}
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-min-32-chars}
    access-token-validity-ms: 900000
    refresh-token-validity-ms: 604800000

  # Sandbox mặc định (credentials mẫu MoMo công khai). Production: set biến môi trường hoặc .env.
  momo:
    partner-code: ${MOMO_PARTNER_CODE:MOMO}
    access-key: ${MOMO_ACCESS_KEY:F8BBA842ECF85}
    secret-key: ${MOMO_SECRET_KEY:K951B6PE1waDMi640xX08PD3vg6EkVlz}
    endpoint: ${MOMO_ENDPOINT:https://test-payment.momo.vn}
    ipn-url: ${MOMO_IPN_URL:http://localhost:8080/api/payments/momo/ipn}
    return-url: ${MOMO_RETURN_URL:http://localhost:5173/checkout/result}
    partner-name: ${MOMO_PARTNER_NAME:FlourishTravel}
    store-id: ${MOMO_STORE_ID:MomoTestStore}
    lang: vi

  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}

  gemini:
    api-key: ${GEMINI_API_KEY:}
    # gemini-2.0-flash ổn định, ít 503; có thể đổi GEMINI_MODEL=gemini-3-flash-preview
    model: ${GEMINI_MODEL:gemini-2.0-flash}

  coze:
    api-key: ${COZE_API_KEY:}
    base-url: ${COZE_BASE_URL:https://api.coze.com}
    bot-id: ${COZE_BOT_ID:}

  n8n:
    # Webhook URL của n8n workflow (Production URL từ node Webhook trong n8n)
    # Format: https://khanhtn45.app.n8n.cloud/webhook/<path>
    webhook-url: ${N8N_WEBHOOK_URL:}
    # Timeout tính bằng giây cho mỗi request đến n8n
    timeout-seconds: ${N8N_TIMEOUT_SECONDS:15}
    # true = dùng n8n làm chatbot chính; false = dùng logic cũ (Gemini/OpenAI)
    enabled: ${N8N_ENABLED:true}

  # AWS Bedrock (LLM fallback: dùng Access Key ID + Secret Access Key từ IAM)
  bedrock:
    region: ${BEDROCK_REGION:us-east-1}
    access-key-id: ${BEDROCK_ACCESS_KEY_ID:}
    secret-access-key: ${BEDROCK_SECRET_ACCESS_KEY:}
    model-id: ${BEDROCK_MODEL_ID:anthropic.claude-3-haiku-20240307-v1:0}

  google:
    maps-api-key: ${GOOGLE_MAPS_API_KEY:}

  # Có hoặc không dấu / cuối đều được (BE chuẩn hóa khi ghép /checkout/...).
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  api-base-url: ${API_BASE_URL:http://localhost:8080/api}
  upload:
    # local = lưu disk + phục vụ /uploads/** ; s3 = PutObject lên bucket, trả về URL S3/CDN
    storage: ${UPLOAD_STORAGE:local}
    dir: ${UPLOAD_DIR:uploads}
  s3:
    bucket: ${S3_BUCKET:amz-ftl}
    region: ${S3_REGION:${AWS_REGION:ap-southeast-2}}
    public-url-prefix: ${S3_PUBLIC_URL_PREFIX:https://amz-ftl.s3.ap-southeast-2.amazonaws.com}
    # Tuỳ chọn: chỉ dùng cho S3 upload — đặt trong BE/.env (không để default chứa secret trong repo)
    upload-access-key-id: ${S3_UPLOAD_ACCESS_KEY_ID:}
    upload-secret-access-key: ${S3_UPLOAD_SECRET_ACCESS_KEY:}

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  show-actuator: false

logging:
  level:
    root: INFO
    com.flourishtravel: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: WARN
