# Chạy local: mvn spring-boot:run (pom.xml đã bật profile dev = H2, không Redis).
# JAR / production: không dùng profile dev trừ khi set tay — cần PostgreSQL + Redis như cấu hình dưới.
# Deploy cloud (ECS): SPRING_PROFILES_ACTIVE=cloud — mặc định DigitalOcean PostgreSQL trong application-cloud.yml; bắt buộc DB_PASSWORD (và tuỳ chỉnh DB_* nếu đổi cluster).
spring:
  application:
    name: flourish-travel-backend

  datasource:
    # Port 5433 thường dùng khi cài PostgreSQL (vd. PostgreSQL 18); 5432 mặc định. Đổi qua biến DB_PORT nếu cần.
    # DigitalOcean / cloud TLS: DB_SSL_MODE=require (tránh DB_JDBC_PARAMS=?... — ECS/AWS form env hay cấm ký tự "?").
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:flourishtravel}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      data-source-properties:
        sslmode: ${DB_SSL_MODE:disable}

  jpa:
    # Cần khi Hibernate chưa connect được DB lúc bootstrap (mạng / SSL / mật khẩu); tránh "Unable to determine Dialect".
    # Cảnh báo HHH90000025 khi mọi thứ bình thường có thể bỏ qua. Profile dev dùng H2Dialect trong application-dev.yml.
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Cho phép chuỗi JSON chứa ký tự điều khiển (vd. xuống dòng) để request từ Swagger/ client không bị 500
  jackson:
    parser:
      allow-unquoted-control-chars: true

server:
  # PORT: Railway/Render tự set; SERVER_PORT: dùng khi chạy local hoặc set tay
  port: ${PORT:${SERVER_PORT:8080}}
  # Không dùng context-path: DO ingress rule /api đã strip prefix → container nhận /tours, /health, ...

# JWT & Encryption
app:
  seed:
    # Cloud (profile cloud): false — tránh seed nặng làm chậm startup / fail health check DO.
    enabled: ${SEED_ENABLED:true}
    # ECS/cloud: false (mặc định). Local dev: bật trong application-dev.yml hoặc SEED_CHATBOT_CONFIG=true
    chatbot-config-on-startup: ${SEED_CHATBOT_CONFIG:false}
  encryption:
    pii-key: ${PII_ENCRYPTION_KEY:}
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-min-32-chars}
    access-token-validity-ms: 86400000
    refresh-token-validity-ms: 604800000

  # Sandbox mặc định (credentials mẫu MoMo công khai). Production: set biến môi trường hoặc .env.
  momo:
    partner-code: ${MOMO_PARTNER_CODE:MOMO}
    access-key: ${MOMO_ACCESS_KEY:F8BBA842ECF85}
    secret-key: ${MOMO_SECRET_KEY:K951B6PE1waDMi640xX08PD3vg6EkVlz}
    endpoint: ${MOMO_ENDPOINT:https://test-payment.momo.vn}
    ipn-url: ${MOMO_IPN_URL:http://localhost:8080/payments/momo/ipn}
    return-url: ${MOMO_RETURN_URL:http://localhost:5173/checkout/result}
    partner-name: ${MOMO_PARTNER_NAME:FlourishTravel}
    store-id: ${MOMO_STORE_ID:MomoTestStore}
    lang: vi

  # PayOS — credentials từ my.payos.vn; set trong BE/.env
  payos:
    client-id: ${PAYOS_CLIENT_ID:}
    api-key: ${PAYOS_API_KEY:}
    checksum-key: ${PAYOS_CHECKSUM_KEY:}
    webhook-url: ${PAYOS_WEBHOOK_URL:http://localhost:8080/payments/payos/webhook}
    return-url: ${PAYOS_RETURN_URL:http://localhost:5173/checkout/result}
    cancel-url: ${PAYOS_CANCEL_URL:http://localhost:5173/checkout/result}

  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:google/gemini-3-flash-preview}
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    http-referer: ${OPENROUTER_HTTP_REFERER:https://flourishtravel.com}
    app-title: ${OPENROUTER_APP_TITLE:FlourishTravel}

  google:
    maps-api-key: ${GOOGLE_MAPS_API_KEY:}

  # Có hoặc không dấu / cuối đều được (BE chuẩn hóa khi ghép /checkout/...).
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  # Public URL (có /api) khi deploy; local: http://localhost:8080
  api-base-url: ${API_BASE_URL:http://localhost:8080}
  upload:
    # local = lưu disk + phục vụ /uploads/** ; s3 = PutObject lên bucket, trả về URL S3/CDN
    storage: ${UPLOAD_STORAGE:local}
    dir: ${UPLOAD_DIR:uploads}
  s3:
    bucket: ${S3_BUCKET:amz-ftl}
    region: ${S3_REGION:${AWS_REGION:ap-southeast-2}}
    public-url-prefix: ${S3_PUBLIC_URL_PREFIX:https://amz-ftl.s3.ap-southeast-2.amazonaws.com}
    # Tuỳ chọn: chỉ dùng cho S3 upload — đặt trong BE/.env (không để default chứa secret trong repo)
    upload-access-key-id: ${S3_UPLOAD_ACCESS_KEY_ID:}
    upload-secret-access-key: ${S3_UPLOAD_SECRET_ACCESS_KEY:}

  flora:
    timezone: ${FLORA_TOUR_TIMEZONE:Asia/Ho_Chi_Minh}
    default-gathering-hour: ${FLORA_GATHERING_HOUR:7}
    default-gathering-minute: ${FLORA_GATHERING_MINUTE:0}
    reminder-check-ms: ${FLORA_REMINDER_CHECK_MS:60000}
    return-to-bus-threshold-meters: ${FLORA_RETURN_THRESHOLD_M:500}
    return-to-bus-minutes-before: ${FLORA_RETURN_MINUTES:20}
    location-retention-hours: ${FLORA_LOCATION_RETENTION_H:48}
    journey:
      safety-buffer-minutes: ${FLORA_JOURNEY_SAFETY_BUFFER_MINUTES:10}
    recommendations:
      default-radius-meters: ${FLORA_RECOMMEND_DEFAULT_RADIUS_M:1000}
      max-radius-meters: ${FLORA_RECOMMEND_MAX_RADIUS_M:3000}
      default-limit: ${FLORA_RECOMMEND_DEFAULT_LIMIT:5}
      max-limit: ${FLORA_RECOMMEND_MAX_LIMIT:10}
      estimated-walking-speed-meters-per-minute: ${FLORA_RECOMMEND_WALK_SPEED_MPM:60}
      rate-limit:
        requests-per-minute: ${FLORA_RECOMMEND_RATE_LIMIT_PER_MINUTE:10}
      default-visit-minutes:
        restaurant: 35
        cafe: 30
        attraction: 45
        photo-spot: 20
        shopping: 30
        restroom: 10

  chatbot:
    rate-limit:
      authenticated:
        requests-per-minute: ${CHATBOT_RATE_LIMIT_AUTH_PER_MINUTE:30}
        requests-per-hour: ${CHATBOT_RATE_LIMIT_AUTH_PER_HOUR:300}
      anonymous:
        requests-per-minute: ${CHATBOT_RATE_LIMIT_ANON_PER_MINUTE:10}
        requests-per-hour: ${CHATBOT_RATE_LIMIT_ANON_PER_HOUR:80}
      in-memory:
        max-keys: ${CHATBOT_RATE_LIMIT_MAX_KEYS:10000}
        cleanup-interval-ms: ${CHATBOT_RATE_LIMIT_CLEANUP_MS:300000}
      trusted-proxy:
        enabled: ${CHATBOT_TRUSTED_PROXY:false}

  push:
    fcm:
      enabled: ${FCM_ENABLED:false}
      credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS:}
      max-devices-per-user: ${FCM_MAX_DEVICES_PER_USER:5}
      max-attempts: ${FCM_MAX_ATTEMPTS:3}
      dispatcher-poll-ms: ${FCM_DISPATCHER_POLL_MS:60000}
      allowed-types:
        - TOUR_REMINDER_30_MINUTES
        - TOUR_REMINDER_15_MINUTES
        - TOUR_REMINDER_5_MINUTES
        - RETURN_TO_BUS_ALERT
        - SCHEDULE_CHANGED
        - POST_TOUR_FEEDBACK

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  show-actuator: false

logging:
  level:
    root: INFO
    com.flourishtravel: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: WARN
