# ECS / AWS / Docker: SPRING_PROFILES_ACTIVE=cloud
# DigitalOcean Managed PostgreSQL (Singapore). Bắt buộc DB_PASSWORD từ DO Dashboard → Databases → Connection details.
#   DB_HOST=db-postgresql-sgp1-flourishtourism-do-user-37760190-0.m.db.ondigitalocean.com
#   DB_PORT=25060  DB_NAME=defaultdb  DB_USER=doadmin  DB_SSL_MODE=require
spring:
  config:
    activate:
      on-profile: cloud
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  datasource:
    url: jdbc:postgresql://${DB_HOST:db-postgresql-sgp1-flourishtourism-do-user-37760190-0.m.db.ondigitalocean.com}:${DB_PORT:25060}/${DB_NAME:defaultdb}
    username: ${DB_USER:doadmin}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      data-source-properties:
        sslmode: ${DB_SSL_MODE:require}

app:
  seed:
    enabled: false
    chatbot-config-on-startup: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.flourishtravel: INFO
    org.springframework.security: WARN
